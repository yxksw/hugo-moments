<script>

const musicConfig = {
    id: '13681647281',
    server: 'netease',
    type: 'playlist',
    api: 'https:\/\/meting-api.314926.xyz\/api'
};


const metingContainer = document.getElementById('meting-container');
const metingJs = document.createElement('meting-js');
metingJs.setAttribute('id', musicConfig.id);
metingJs.setAttribute('server', musicConfig.server);
metingJs.setAttribute('type', musicConfig.type);
metingJs.setAttribute('mutex', 'true');
metingJs.setAttribute('preload', 'none');
metingJs.setAttribute('data-lrctype', '0');
metingJs.setAttribute('order', 'random');
metingJs.setAttribute('volume', '0.8');
metingJs.setAttribute('api', musicConfig.api + '?server=:server&type=:type&id=:id&auth=:auth&r=:r');
metingContainer.appendChild(metingJs);


const liuMusic = {
    musicPlaying: false,
    isMusicBind: false,

    musicToggle(isMeting = true) {
        if (!this.isMusicBind) {
            this.musicBind();
        }

        const $music = document.querySelector("#nav-music");
        const $meting = document.querySelector("meting-js");

        this.musicPlaying = !this.musicPlaying;
        $music?.classList.toggle("playing", this.musicPlaying);
        $music?.classList.toggle("stretch", this.musicPlaying);

        if (isMeting && $meting?.aplayer) {
            this.musicPlaying ? $meting.aplayer.play() : $meting.aplayer.pause();
        }
    },

    musicBind() {
        const $music = document.querySelector("#nav-music");
        const $name = document.querySelector("#nav-music .aplayer-music");
        const $button = document.querySelector("#nav-music .aplayer-button");

        $name?.addEventListener("click", () => {
            $music?.classList.toggle("stretch");
        });

        $button?.addEventListener("click", () => {
            this.musicToggle(false);
        });

        this.isMusicBind = true;
    }
};
</script>

<script>

function openFriendsModal() {
    const modal = document.getElementById('friends-modal');
    modal.style.display = 'flex';
    document.body.style.overflow = 'hidden';

    
    if (!window.qexoFriendsLoaded) {
        loadQexoFriendsLib();
    }
}

function closeFriendsModal() {
    const modal = document.getElementById('friends-modal');
    modal.style.display = 'none';
    document.body.style.overflow = '';
}

function loadQexoFriendsLib() {
    
    const script = document.createElement('script');
    script.src = 'https://registry.npmmirror.com/qexo-static/1.6.0/files/hexo/friends.js';
    script.onload = function() {
        window.qexoFriendsLoaded = true;
        
        if (typeof loadQexoFriends === 'function') {
            loadQexoFriends("qexo-friends", "https://qexo.050815.xyz");
        }
    };
    document.head.appendChild(script);
}


document.addEventListener('click', function(e) {
    const modal = document.getElementById('friends-modal');
    if (e.target === modal) {
        closeFriendsModal();
    }
});


document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        closeFriendsModal();
    }
});
</script>
