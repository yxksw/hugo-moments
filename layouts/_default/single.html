{{ define "main" }}
<div class="container">
    <div class="single-post-page">
        <a href="/" class="back-link">← 返回首页</a>
        {{ partial "row.html" (dict "page" . "index" 0 "isSingle" true) }}
    </div>
</div>

<style>
.single-post-page {
    padding-top: 20px;
}
.back-link {
    display: inline-block;
    margin-bottom: 20px;
    color: var(--link-color, #007bff);
    text-decoration: none;
    font-size: 14px;
}
.back-link:hover {
    text-decoration: underline;
}
</style>
