# Pagefind 配置文件
# 为每篇文章生成独立搜索结果

# 源目录
site: public

# 只包含单篇文章页面（排除列表页）
include:
  - '/posts/*/index.html'

# 排除其他所有页面
exclude:
  - '/tags/**'
  - '/search/**'
  - '/404.html'
  - '/index.html'
  - '/1/**'
  - '/2/**'
  - '/3/**'
  - '/4/**'
  - '/5/**'
  - '/moments/**'
  - '/categories/**'
  - '/posts/index.html'

# 添加锚点到结果
add_anchor_to_results: false
